<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全球专利交易流向交互地图</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="filter-panel">
      <div class="brand-block">
        <h1>全球专利交易流向图谱</h1>
        <p>高质量专利技术领域交易网络分析</p>
      </div>

      <section>
        <h2>时间</h2>
        <label>阶段
          <select id="periodSelect"></select>
        </label>
        <div class="two-col">
          <label>起始年
            <input id="yearFrom" type="number" step="1">
          </label>
          <label>结束年
            <input id="yearTo" type="number" step="1">
          </label>
        </div>
      </section>

      <section>
        <h2>指标</h2>
        <label>质量口径
          <select id="qualitySelect"></select>
        </label>
        <label>统计量
          <select id="measureSelect">
            <option value="trans_patent">专利数量</option>
            <option value="trans_times">交易次数</option>
          </select>
        </label>
        <label>时间汇总
          <select id="timeAggSelect">
            <option value="none" selected>不汇总</option>
            <option value="sum">汇总</option>
          </select>
        </label>
      </section>

      <section>
        <h2>分类</h2>
        <label>交易类型
          <select id="typeSelect"></select>
        </label>
        <label>技术领域
          <select id="techSelect"></select>
        </label>
        <label>流向类型
          <select id="flowTypeSelect">
            <option value="all">全部流向</option>
            <option value="entity_entity">实体产业国家 → 实体产业国家</option>
            <option value="entity_haven">实体产业国家 → 避税地/控股节点</option>
            <option value="haven_entity">避税地/控股节点 → 实体产业国家</option>
            <option value="haven_haven">避税地/控股节点 → 避税地/控股节点</option>
            <option value="china">中国相关流向</option>
            <option value="other">其他流向</option>
          </select>
        </label>
      </section>

      <section>
        <h2>国家</h2>
        <label>关注国家/地区
          <select id="countrySelect"></select>
        </label>
        <label>角色
          <select id="countryRoleSelect">
            <option value="any">流入或流出</option>
            <option value="seller">作为卖方</option>
            <option value="buyer">作为买方</option>
          </select>
        </label>
      </section>

      <section>
        <h2>数量范围</h2>
        <div class="two-col">
          <label>最小值
            <input id="minValue" type="number" min="0" step="1" placeholder="0">
          </label>
          <label>最大值
            <input id="maxValue" type="number" min="0" step="1" placeholder="不限">
          </label>
        </div>
        <label>地图显示
          <select id="topNSelect">
            <option value="50">Top 50</option>
            <option value="100" selected>Top 100</option>
            <option value="200">Top 200</option>
            <option value="500">Top 500</option>
            <option value="2000">Top 2000</option>
            <option value="all">全部</option>
          </select>
        </label>
      </section>

      <section>
        <h2>快捷专题</h2>
        <div class="quick-grid">
          <button data-action="chinaBuyer">中国作为买方</button>
          <button data-action="chinaSeller">中国作为卖方</button>
          <button data-action="usRelated">美国相关流向</button>
          <button data-action="entityToHaven">实体 → 避税地</button>
          <button data-action="havenToEntity">避税地 → 实体</button>
          <button data-action="semiconductors">半导体</button>
          <button data-action="computer">计算机技术</button>
          <button data-action="biomed">生物医药</button>
          <button data-action="after2018">2018年后</button>
          <button data-action="after2020">2020年后</button>
        </div>
      </section>

      <button id="resetBtn" class="reset-btn">重置筛选</button>
    </aside>

    <div id="sidebarResizer" class="layout-resizer vertical-resizer" title="拖动调整左侧筛选栏宽度"></div>

    <main class="main-panel">
      <header class="toolbar">
        <div>
          <h2 id="viewTitle">专利交易流向地图</h2>
          <p id="viewSubtitle">加载中...</p>
        </div>
        <div class="legend">
          <span><i class="legend-blue"></i>实体→实体</span>
          <span><i class="legend-red"></i>实体→避税地</span>
          <span><i class="legend-green"></i>避税地→实体</span>
          <span><i class="legend-purple"></i>中国相关</span>
          <span><i class="legend-gray"></i>其他</span>
        </div>
      </header>

      <section class="map-card">
        <svg id="flowMap" role="img" aria-label="全球专利交易流向地图"></svg>
        <div id="tooltip" class="tooltip"></div>
      </section>

      <div id="mapResizer" class="layout-resizer horizontal-resizer" title="拖动调整地图和下方信息区高度"></div>

      <section class="bottom-panel">
        <div class="ranking-card">
          <div class="panel-title">
            <h2>流向排名</h2>
            <span id="rowCountLabel"></span>
          </div>
          <div class="table-wrap">
            <table id="rankingTable">
              <thead>
                <tr>
                  <th>排名</th>
                  <th>年份</th>
                  <th>卖方</th>
                  <th>买方</th>
                  <th>流向类型</th>
                  <th>交易类型</th>
                  <th>技术领域</th>
                  <th>交易次数</th>
                  <th>专利数量</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <aside class="detail-card">
          <h2>详情</h2>
          <div id="detailContent" class="detail-content">点击地图连线或排名表查看流向详情。</div>
          <svg id="trendChart" class="trend-chart"></svg>
        </aside>
      </section>

      <footer class="note">
        基础流向表反映整体流向；交易类型和技术领域为多标签分类统计，不能简单加总还原整体。质量指标基于“被其他专利引用数量_adj1”在唯一申请编号层面生成，top1/top5/top10/top25 为嵌套口径，不能相加。
      </footer>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
